<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe</title>
    <link rel="stylesheet" href="style.css">
</head>
<img src="https://pngimg.com/uploads/planet/planet_PNG21.png" class="planet" id="planet1">
<img src="https://pngimg.com/uploads/planet/planet_PNG27.png" class="planet" id="planet2">
<body>

    <!-- HERO SECTION -->
   <section class="hero">
    <canvas id="starfield" class="layer" data-speed="2"></canvas>

    <div class="content layer" data-speed="5">
        <h1>WELCOME TO THE UNIVERSE</h1>
        <p>Explore the infinite cosmos</p>
    </div>
</section>

    <!-- PARALLAX SECTIONS -->
    <section class="parallax" id="section1">
        <h2>The Beginning</h2>
    </section>

    <section class="content-section">
        <p>Stars are born in vast cosmic clouds.</p>
    </section>

    <section class="parallax" id="section2">
        <h2>Galaxies</h2>
    </section>

    <section class="content-section">
        <p>Billions of galaxies fill the universe.</p>
    </section>

    <section class="parallax" id="section3">
        <h2>Beyond</h2>
    </section>

    <script src="script.js"></script>
</body>
</html>
